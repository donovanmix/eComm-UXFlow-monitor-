<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Monitor — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface-2: #1a2234;
      --border: #1e293b;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --green: #10b981;
      --green-bg: rgba(16, 185, 129, 0.1);
      --red: #ef4444;
      --red-bg: rgba(239, 68, 68, 0.1);
      --amber: #f59e0b;
      --amber-bg: rgba(245, 158, 11, 0.1);
      --blue: #3b82f6;
      --blue-bg: rgba(59, 130, 246, 0.08);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- Ambient background glow --- */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body.has-failures::before {
      background: radial-gradient(circle, rgba(239,68,68,0.06) 0%, transparent 70%);
    }

    /* --- Header --- */
    .header {
      padding: 32px 40px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }
    .header-left h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-left h1 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    .header-left h1 .dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .header-left p {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 4px;
    }

    .header-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: var(--surface-2); border-color: #334155; }
    .btn.primary {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .btn.primary:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* --- Summary Cards --- */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      padding: 0 40px 24px;
      position: relative;
      z-index: 1;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.3s;
    }
    .card:hover { border-color: #334155; }
    .card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-dim);
      font-weight: 500;
    }
    .card .value {
      font-size: 32px;
      font-weight: 700;
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .card .value.green { color: var(--green); }
    .card .value.red { color: var(--red); }
    .card .value.amber { color: var(--amber); }
    .card .subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* --- Site Results --- */
    .sites {
      padding: 0 40px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
      gap: 20px;
      position: relative;
      z-index: 1;
    }
    .site-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .site-header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .site-header .site-name {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'JetBrains Mono', monospace;
    }
    .badge.passed { background: var(--green-bg); color: var(--green); }
    .badge.failed { background: var(--red-bg); color: var(--red); }
    .badge.pending { background: var(--amber-bg); color: var(--amber); }

    .site-url {
      font-size: 12px;
      color: var(--text-dim);
    }
    .site-url a { color: var(--blue); text-decoration: none; }
    .site-url a:hover { text-decoration: underline; }

    .site-duration {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Steps */
    .steps {
      padding: 4px 0;
    }
    .step {
      display: flex;
      align-items: center;
      padding: 14px 24px;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .step:last-child { border-bottom: none; }
    .step:hover { background: var(--surface-2); }

    .step-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .step-icon.passed { background: var(--green-bg); color: var(--green); }
    .step-icon.failed { background: var(--red-bg); color: var(--red); }
    .step-icon.skipped { background: var(--amber-bg); color: var(--amber); }

    .step-info { flex: 1; min-width: 0; }
    .step-name {
      font-size: 13px;
      font-weight: 500;
    }
    .step-message {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .step-message.error { color: var(--red); }

    .step-duration {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    /* --- History Timeline --- */
    .history-section {
      padding: 0 40px 40px;
      position: relative;
      z-index: 1;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .history-grid {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .history-dot {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .history-dot:hover {
      transform: scale(1.3);
      z-index: 2;
    }
    .history-dot.passed { background: var(--green); opacity: 0.7; }
    .history-dot.passed:hover { opacity: 1; }
    .history-dot.failed { background: var(--red); opacity: 0.8; }
    .history-dot.failed:hover { opacity: 1; }
    .history-dot .tooltip {
      display: none;
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      white-space: nowrap;
      pointer-events: none;
    }
    .history-dot:hover .tooltip { display: block; }

    /* --- Loading state --- */
    .loading {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-dim);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Empty state --- */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { max-width: 400px; margin: 0 auto; line-height: 1.6; }

    /* --- Toast notification --- */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 100;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .header { padding: 24px 20px 16px; flex-direction: column; gap: 16px; }
      .summary { padding: 0 20px 16px; grid-template-columns: repeat(2, 1fr); }
      .sites { padding: 0 20px 24px; grid-template-columns: 1fr; }
      .history-section { padding: 0 20px 32px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Loading dashboard...</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // --- State ---------------------------------------------------------------
    let latestResults = null;
    let history = [];
    let isRunning = false;
    let autoRefreshId = null;

    // --- API -----------------------------------------------------------------
    async function fetchLatest() {
      try {
        const res = await fetch('/api/results/latest');
        latestResults = await res.json();
      } catch (e) { console.error('Fetch latest failed:', e); }
    }

    async function fetchHistory() {
      try {
        const res = await fetch('/api/results/history?limit=30');
        history = await res.json();
      } catch (e) { console.error('Fetch history failed:', e); }
    }

    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        isRunning = data.isRunning;
      } catch (e) {}
    }

    async function triggerTest() {
      try {
        const res = await fetch('/api/run-test', { method: 'POST' });
        const data = await res.json();
        showToast(data.message);
        isRunning = true;
        render();
        // Poll for completion
        pollForCompletion();
      } catch (e) {
        showToast('Failed to trigger test');
      }
    }

    async function pollForCompletion() {
      const poll = setInterval(async () => {
        await fetchStatus();
        if (!isRunning) {
          clearInterval(poll);
          await fetchLatest();
          await fetchHistory();
          render();
          showToast('Test completed! Results updated.');
        }
      }, 5000);
    }

    // --- Toast ---------------------------------------------------------------
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3500);
    }

    // --- Render --------------------------------------------------------------
    function render() {
      const app = document.getElementById('app');

      if (!latestResults || !latestResults.sites || latestResults.sites.length === 0) {
        app.innerHTML = `
          <div class="header">
            <div class="header-left">
              <h1><span class="dot"></span> Checkout Monitor</h1>
              <p>slumberland.com.my & vono.com.my</p>
            </div>
            <div class="header-right">
              <button class="btn primary" onclick="triggerTest()">▶ Run Test Now</button>
            </div>
          </div>
          <div class="empty-state">
            <div class="icon">🛒</div>
            <h3>No test results yet</h3>
            <p>Click "Run Test Now" to run the first checkout flow test, or wait for the daily scheduled run at 8:00 AM MYT.</p>
          </div>
        `;
        return;
      }

      const data = latestResults;
      const allPassed = data.summary.failed === 0;
      const timestamp = new Date(data.timestamp).toLocaleString('en-MY', { timeZone: 'Asia/Kuala_Lumpur' });

      // Set ambient glow
      if (!allPassed) document.body.classList.add('has-failures');
      else document.body.classList.remove('has-failures');

      // Calculate uptime from history
      const totalRuns = history.length || 1;
      const passedRuns = history.filter(h => h.summary.failed === 0).length;
      const uptimePercent = ((passedRuns / totalRuns) * 100).toFixed(1);

      let html = `
        <div class="header">
          <div class="header-left">
            <h1>
              <span class="dot ${allPassed ? '' : 'red'}"></span>
              Checkout Monitor
            </h1>
            <p>Last run: ${timestamp}</p>
          </div>
          <div class="header-right">
            <button class="btn" onclick="loadData()" title="Refresh">↻ Refresh</button>
            <button class="btn primary" onclick="triggerTest()" ${isRunning ? 'disabled' : ''}>
              ${isRunning ? '⏳ Running...' : '▶ Run Test Now'}
            </button>
          </div>
        </div>

        <div class="summary">
          <div class="card">
            <div class="label">Overall Status</div>
            <div class="value ${allPassed ? 'green' : 'red'}">${allPassed ? 'PASS' : 'FAIL'}</div>
            <div class="subtitle">${data.summary.passed}/${data.summary.total} sites healthy</div>
          </div>
          <div class="card">
            <div class="label">Sites Monitored</div>
            <div class="value">${data.summary.total}</div>
            <div class="subtitle">Slumberland & Vono</div>
          </div>
          <div class="card">
            <div class="label">30-Day Uptime</div>
            <div class="value ${parseFloat(uptimePercent) >= 95 ? 'green' : parseFloat(uptimePercent) >= 80 ? 'amber' : 'red'}">${uptimePercent}%</div>
            <div class="subtitle">${passedRuns}/${totalRuns} runs passed</div>
          </div>
          <div class="card">
            <div class="label">Next Scheduled Run</div>
            <div class="value" style="font-size: 22px;">8:00 AM</div>
            <div class="subtitle">Daily, Malaysia time</div>
          </div>
        </div>

        <div class="sites">
      `;

      // Site cards
      for (const site of data.sites) {
        const passed = site.overallStatus === 'passed';
        html += `
          <div class="site-card">
            <div class="site-header">
              <div>
                <div class="site-name">
                  ${site.site}
                  <span class="badge ${passed ? 'passed' : 'failed'}">${passed ? 'Passed' : 'Failed'}</span>
                </div>
                <div class="site-url"><a href="${site.url}" target="_blank">${site.url}</a></div>
              </div>
              <div class="site-duration">${(site.duration / 1000).toFixed(1)}s</div>
            </div>
            <div class="steps">
        `;

        for (const step of site.steps) {
          const icon = step.status === 'passed' ? '✓' : '✗';
          html += `
            <div class="step">
              <div class="step-icon ${step.status}">${icon}</div>
              <div class="step-info">
                <div class="step-name">${step.name}</div>
                <div class="step-message ${step.status === 'failed' ? 'error' : ''}">${escapeHtml(step.message)}</div>
              </div>
              <div class="step-duration">${(step.duration / 1000).toFixed(1)}s</div>
            </div>
          `;
        }

        // If not all 5 steps ran (failed early), show remaining as skipped
        const stepNames = ['Homepage Load', 'Product Page Load', 'Add to Cart', 'Cart Page', 'Checkout Page'];
        const completedSteps = site.steps.map(s => s.name);
        for (const name of stepNames) {
          if (!completedSteps.includes(name)) {
            html += `
              <div class="step">
                <div class="step-icon skipped">—</div>
                <div class="step-info">
                  <div class="step-name">${name}</div>
                  <div class="step-message">Skipped (previous step failed)</div>
                </div>
                <div class="step-duration">—</div>
              </div>
            `;
          }
        }

        html += `</div></div>`;
      }

      html += `</div>`;

      // History timeline
      if (history.length > 1) {
        html += `
          <div class="history-section">
            <div class="section-title">📊 Test History (Last 30 Days)</div>
            <div class="history-grid">
        `;
        for (const run of history) {
          const runPassed = run.summary.failed === 0;
          const runDate = new Date(run.timestamp).toLocaleDateString('en-MY', { timeZone: 'Asia/Kuala_Lumpur' });
          const runTime = new Date(run.timestamp).toLocaleTimeString('en-MY', { timeZone: 'Asia/Kuala_Lumpur', hour: '2-digit', minute: '2-digit' });
          html += `
            <div class="history-dot ${runPassed ? 'passed' : 'failed'}">
              <div class="tooltip">${runDate} ${runTime} — ${runPassed ? 'All Passed' : 'Failed'}</div>
            </div>
          `;
        }
        html += `</div></div>`;
      }

      app.innerHTML = html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    // --- Init ----------------------------------------------------------------
    async function loadData() {
      await Promise.all([fetchLatest(), fetchHistory(), fetchStatus()]);
      render();
    }

    loadData();

    // Auto-refresh every 60 seconds
    setInterval(loadData, 60000);
  </script>
</body>
</html>
